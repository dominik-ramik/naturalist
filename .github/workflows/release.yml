name: Build and Release App

on:
  push:
    tags:
      - 'v*' # Triggers only when a tag starting with 'v' is pushed (e.g., v3.8.0)

# CRITICAL: Grant the workflow permission to create releases and upload files
permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # Note: fetch-depth: 0 is sometimes required for generate_release_notes to accurately see all past tags/commits
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Zip the built app
        run: |
          cd dist
          zip -r ../naturalist-app.zip ./*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: NaturaList ${{ github.ref_name }} # Formats the title nicely, e.g., "NaturaList v3.8.0"
          body: |
            ### Installation
            Download the `naturalist-app.zip` asset below, extract it, and host the contents on any static web server.

            See the [naturalist.netlify.app](https://naturalist.netlify.app/) for how-tos and documentation. Visit [naturalist.netlify.app/demo](https://naturalist.netlify.app/demo/) to see the app in action.
            
            ### What's Changed
          files: naturalist-app.zip
          generate_release_notes: true